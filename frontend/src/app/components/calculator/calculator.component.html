<div class="calculator-container" [class.dark]="darkMode">

  <h1>Voice Calculator</h1>

  <!-- Top Controls -->
  <div class="top-controls">
    <button class="theme-btn ripple-btn" (click)="toggleDarkMode()">
      {{ darkMode ? '☀ Light Mode' : '🌙 Dark Mode' }}
    </button>

    <button class="mode-btn ripple-btn" (click)="toggleAngleMode()">
      Mode: {{ angleMode }}
    </button>
  </div>

  <!-- Input Section -->
  <div class="input-section">

    <input 
      type="text"
      [(ngModel)]="expression"
      placeholder="Enter expression"
      (keydown.enter)="!loading && calculate()"
    />

    <button 
      class="mic-btn ripple-btn" 
      [class.listening]="listening"
      (click)="startListening()">
      {{ listening ? '🛑 Stop' : '🎤' }}
    </button>

    <button 
      class="calculate-btn ripple-btn"
      (click)="calculate()" 
      [disabled]="loading">
      {{ loading ? 'Calculating...' : 'Calculate' }}
    </button>

  </div>

  <!-- Scientific Grid -->
  <div class="scientific-grid">

    <!-- Trigonometry -->
    <button class="ripple-btn" (click)="insert('sin(')">sin</button>
    <button class="ripple-btn" (click)="insert('cos(')">cos</button>
    <button class="ripple-btn" (click)="insert('tan(')">tan</button>
    <button class="ripple-btn" (click)="insert('log(')">log</button>

    <!-- Advanced -->
    <button class="ripple-btn" (click)="insert('ln(')">ln</button>
    <button class="ripple-btn" (click)="insert('sqrt(')">√</button>
    <button class="ripple-btn" (click)="insert('pi')">π</button>
    <button class="ripple-btn" (click)="insert('e')">e</button>

    <!-- Operators -->
    <button class="ripple-btn" (click)="insert('^')">^</button>
    <button class="ripple-btn" (click)="insert('(')">(</button>
    <button class="ripple-btn" (click)="insert(')')">)</button>
    <button class="ripple-btn" (click)="insert('%')">%</button>

    <!-- Numbers -->
    <button class="ripple-btn" (click)="insert('9')">9</button>
    <button class="ripple-btn" (click)="insert('8')">8</button>
    <button class="ripple-btn" (click)="insert('7')">7</button>

    <button class="ripple-btn" (click)="insert('6')">6</button>
    <button class="ripple-btn" (click)="insert('5')">5</button>
    <button class="ripple-btn" (click)="insert('4')">4</button>

    <button class="ripple-btn" (click)="insert('3')">3</button>
    <button class="ripple-btn" (click)="insert('2')">2</button>
    <button class="ripple-btn" (click)="insert('1')">1</button>

    <button class="ripple-btn" (click)="insert('0')">0</button>

  </div>

  <!-- Loading Spinner -->
  <div class="spinner-container" *ngIf="loading">
    <div class="spinner"></div>
  </div>

  <!-- Result -->
  <div class="result fade-in" *ngIf="result !== null">
    Result: {{ result }}
  </div>

  <!-- History -->
  <div class="history" *ngIf="history.length > 0">
    <h3>History</h3>

    <button class="clear-btn ripple-btn" (click)="clearHistory()">
      Clear History
    </button>

    <div 
      class="history-item ripple-btn"
      *ngFor="let item of history"
      (click)="expression = item.expression"
    >
      {{ item.expression }} = {{ item.result }}
    </div>
  </div>

  <!-- Error -->
  <div class="error fade-in" *ngIf="error">
    {{ error }}
  </div>

</div>
